<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Tournée Logistique PRO++</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height: 55vh; }
#controls { padding:10px; background:#f5f5f5; }
input, button { padding:10px; margin:5px; width:95%; }
button.small { width:auto; padding:5px 10px; }
ul { list-style:none; padding:0; }
li { background:#fff; margin:5px 0; padding:8px; display:flex; justify-content:space-between; align-items:center; }
#stats { padding:10px; background:#fff; font-weight:bold; }
</style>
</head>

<body>

<div id="controls">
<input id="search" placeholder="Ex: Brico Dépôt Saran">

<button onclick="addPlace()">➕ Ajouter point</button>
<button onclick="optimizeRoute()">⚡ Optimiser la tournée</button>
<button onclick="clearAll()">🧹 Reset</button>

<ul id="list"></ul>
</div>

<div id="stats">Distance : 0 km | Temps : 0 min</div>
<div id="map"></div>

<script>

var map = L.map('map').setView([48.3, 1.9], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// ---------------- DATA ----------------
var points = [];
var markers = [];
var routeLine = null;

var totalKm = 0;
var totalTime = 0;

// ---------------- ADD POINT ----------------
function addPlace(){

    let q = document.getElementById("search").value;
    if(!q) return;

    fetch("https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(q))
    .then(r => r.json())
    .then(d => {

        if(!d.length) return alert("Introuvable");

        points.push({
            name: d[0].display_name,
            lat: parseFloat(d[0].lat),
            lon: parseFloat(d[0].lon)
        });

        drawList();
    });
}

// ---------------- OPTIMISATION + ROUTE ----------------
function optimizeRoute(){

    if(points.length < 2) return;

    let coords = points.map(p => p.lon + "," + p.lat).join(";");

    fetch("https://router.project-osrm.org/trip/v1/driving/" +
        coords +
        "?source=first&roundtrip=false&overview=full&geometries=geojson"
    )
    .then(r => r.json())
    .then(data => {

        if(!data.trips || !data.trips[0]) {
            alert("Erreur optimisation");
            return;
        }

        let trip = data.trips[0];

        totalKm = (trip.distance / 1000).toFixed(1);
        totalTime = Math.round(trip.duration / 60);

        drawRoute(trip.geometry);
        drawMarkers();
        updateStats();
    });
}

// ---------------- ROUTE ----------------
function drawRoute(geo){

    if(routeLine) map.removeLayer(routeLine);

    routeLine = L.geoJSON(geo, {
        style: { color: "blue", weight: 4 }
    }).addTo(map);

    map.fitBounds(routeLine.getBounds());
}

// ---------------- MARKERS ----------------
function drawMarkers(){

    markers.forEach(m => map.removeLayer(m));
    markers = [];

    points.forEach((p,i)=>{

        let m = L.marker([p.lat,p.lon])
        .addTo(map)
        .bindPopup((i+1)+" - "+p.name);

        markers.push(m);
    });
}

// ---------------- LIST + DELETE ----------------
function drawList(){

    let ul = document.getElementById("list");
    ul.innerHTML = "";

    points.forEach((p,i)=>{

        ul.innerHTML += `
        <li>
            ${i+1} - ${p.name}
            <button class="small" onclick="removePoint(${i})">❌</button>
        </li>`;
    });
}

// ❌ supprimer point
function removePoint(i){

    points.splice(i,1);

    drawList();

    if(points.length >= 2){
        optimizeRoute();
    } else {
        clearMap();
    }
}

// ---------------- STATS ----------------
function updateStats(){

    document.getElementById("stats").innerHTML =
        "Distance : " + totalKm + " km | Temps : " + totalTime + " min";
}

// ---------------- RESET ----------------
function clearAll(){

    points = [];

    clearMap();
    drawList();

    document.getElementById("stats").innerHTML =
        "Distance : 0 km | Temps : 0 min";
}

// ---------------- CLEAN MAP ----------------
function clearMap(){

    markers.forEach(m => map.removeLayer(m));
    markers = [];

    if(routeLine) map.removeLayer(routeLine);
}

</script>

</body>
</html>
