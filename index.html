<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>TMS Stable Fonctionnel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height: 55vh; }
#controls { padding:10px; background:#f5f5f5; }
input, button { padding:10px; margin:5px; width:95%; }
ul { list-style:none; padding:0; }
li { background:#fff; margin:5px 0; padding:8px; display:flex; justify-content:space-between; }
button.small { width:auto; }
.ok { color:green; }
.bad { color:red; }
</style>
</head>

<body>

<div id="controls">
<input id="search" placeholder="Adresse">
<input id="time" placeholder="Heure départ ex: 06:00">

<button onclick="addStop()">Ajouter</button>
<button onclick="calculate()">Calculer tournée</button>
<button onclick="resetAll()">Reset</button>

<ul id="list"></ul>
</div>

<div id="map"></div>

<script>

var map = L.map('map').setView([48.3, 1.9], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let stops = [];
let markers = [];
let routeLine;

// ---------------- ADD ----------------
function addStop(){

let q = document.getElementById("search").value;
let t = document.getElementById("time").value;

if(!q || !t) return alert("Remplis tout");

fetch("https://nominatim.openstreetmap.org/search?format=json&q="+q)
.then(r=>r.json())
.then(d=>{

stops.push({
name:d[0].display_name,
lat:parseFloat(d[0].lat),
lon:parseFloat(d[0].lon),
time:t
});

drawList();

});
}

// ---------------- LIST ----------------
function drawList(){
let html="";
stops.forEach((s,i)=>{
html+=`<li>${i+1} - ${s.name} (${s.time}) 
<button onclick="removeStop(${i})">X</button></li>`;
});
document.getElementById("list").innerHTML=html;
}

// ---------------- REMOVE ----------------
function removeStop(i){
stops.splice(i,1);
drawList();
}

// ---------------- CALCUL ----------------
function calculate(){

if(stops.length<2) return alert("2 points minimum");

// ordre simple (tu peux optimiser plus tard)
let coords = stops.map(s=>s.lon+","+s.lat).join(";");

fetch("https://router.project-osrm.org/route/v1/driving/"+coords+"?overview=full&geometries=geojson&steps=true")
.then(r=>r.json())
.then(data=>{

let route = data.routes[0];

drawRoute(route.geometry);
buildPlanning(route);

});

}

// ---------------- ROUTE ----------------
function drawRoute(geo){

if(routeLine) map.removeLayer(routeLine);

routeLine = L.geoJSON(geo,{style:{color:"blue"}}).addTo(map);

map.fitBounds(routeLine.getBounds());

}

// ---------------- PLANNING ----------------
function buildPlanning(route){

let steps = route.legs;

let [h,m] = stops[0].time.split(":");
let current = parseInt(h)*60 + parseInt(m);

let html="";

steps.forEach((leg,i)=>{

let travel = Math.round(leg.duration/60);
let unload = 30;

let hh = Math.floor(current/60);
let mm = String(current%60).padStart(2,"0");

let arrival = hh+":"+mm;

let status = (arrival > stops[i].time) ? "bad":"ok";

html+=`
<li class="${status}">
${i+1} - ${stops[i].name}<br>
RDV: ${stops[i].time} | Arrivée: ${arrival}<br>
Trajet: ${travel} min + 30 min
</li>
`;

current += travel + unload;

});

document.getElementById("list").innerHTML = html;

}

// ---------------- RESET ----------------
function resetAll(){
stops=[];
if(routeLine) map.removeLayer(routeLine);
document.getElementById("list").innerHTML="";
}

</script>

</body>
</html>
