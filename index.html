<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Tournée Logistique Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height: 65vh; }
#controls { padding:10px; background:#f5f5f5; }
input, button { padding:10px; margin:5px; width:95%; }
ul { list-style:none; padding:0; }
li { background:#fff; margin:5px 0; padding:8px; display:flex; justify-content:space-between; }
button { width:auto; }
</style>
</head>

<body>

<div id="controls">
<input id="search" placeholder="Ex: Brico Dépôt Saran">
<button onclick="addPlace()">Ajouter point</button>
<button onclick="clearAll()">Reset</button>
<ul id="list"></ul>
</div>

<div id="map"></div>

<script>

var map = L.map('map').setView([48.3, 1.9], 9);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'OSM'
}).addTo(map);

// 🔥 Départ réel : Sup Bois Janville
var depotName = "Sup Bois Janville 28310 France";

var depot = null;
var points = [];

var markers = [];
var routeLine = null;

// 📍 géocode départ
fetch("https://nominatim.openstreetmap.org/search?format=json&q=" + depotName)
.then(r => r.json())
.then(d => {
    depot = {lat:parseFloat(d[0].lat), lon:parseFloat(d[0].lon)};
    L.marker([depot.lat,depot.lon]).addTo(map).bindPopup("Départ");
});

// ➕ ajouter point
function addPlace(){

    let q = document.getElementById("search").value;

    fetch("https://nominatim.openstreetmap.org/search?format=json&q=" + q)
    .then(r => r.json())
    .then(d => {

        if(!d.length) return alert("Introuvable");

        let p = {
            name:d[0].display_name,
            lat:parseFloat(d[0].lat),
            lon:parseFloat(d[0].lon)
        };

        points.push(p);
        update();
    });
}

// 🧠 optimisation + route réelle
function update(){

    if(!depot || points.length == 0) return;

    let coords = depot.lon + "," + depot.lat + ";";

    points.forEach(p=>{
        coords += p.lon + "," + p.lat + ";";
    });

    coords = coords.slice(0,-1);

    fetch("https://router.project-osrm.org/trip/v1/driving/" + coords + "?source=first&roundtrip=false")
    .then(r => r.json())
    .then(data => {

        if(!data.trips) return;

        let order = data.waypoints.map(w => w.waypoint_index);

        let newPoints = [];
        order.forEach(i=>{
            if(i==0) return;
            newPoints.push(points[i-1]);
        });

        points = newPoints;

        drawRoute(data.trips[0].geometry);
        drawList();
        drawMarkers();
    });
}

// 🗺️ affichage route réelle
function drawRoute(geo){

    if(routeLine) map.removeLayer(routeLine);

    routeLine = L.geoJSON({
        type:"Feature",
        geometry: geo
    }).addTo(map);

    map.fitBounds(routeLine.getBounds());
}

// 📌 markers
function drawMarkers(){

    markers.forEach(m=>map.removeLayer(m));
    markers=[];

    points.forEach((p,i)=>{
        let m = L.marker([p.lat,p.lon]).addTo(map)
        .bindPopup((i+1)+" - "+p.name);
        markers.push(m);
    });
}

// 📋 liste
function drawList(){

    let ul = document.getElementById("list");
    ul.innerHTML="";

    points.forEach((p,i)=>{
        ul.innerHTML += `<li>${i+1} - ${p.name}</li>`;
    });
}

// 🔄 reset
function clearAll(){
    points=[];
    markers.forEach(m=>map.removeLayer(m));
    markers=[];
    if(routeLine) map.removeLayer(routeLine);
    document.getElementById("list").innerHTML="";
}

</script>

</body>
</html>
