<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>TMS Logistique PRO CLEAN</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<style>
body { margin:0; font-family:Arial; }
#map { height: 55vh; }
#controls { padding:10px; background:#f5f5f5; }
input, button { padding:10px; margin:5px; width:95%; }
ul { list-style:none; padding:0; }
li { background:#fff; margin:5px 0; padding:8px; display:flex; justify-content:space-between; }
button.small { width:auto; padding:5px 10px; }
#stats { padding:10px; font-weight:bold; background:#fff; }
.ok { color:green; }
.bad { color:red; }
</style>
</head>

<body>

<div id="controls">

<input id="search" placeholder="Adresse (ex: Brico Dépôt Saran)">
<input id="time" placeholder="Heure départ 1er point (ex: 08:00)">

<button onclick="addStop()">➕ Ajouter point</button>
<button onclick="optimizeTour()">⚡ Optimiser tournée</button>
<button onclick="exportMaps()">📍 Export Maps</button>
<button onclick="resetAll()">Reset</button>

<ul id="list"></ul>
</div>

<div id="stats">Aucune tournée</div>
<div id="map"></div>

<script>

var map = L.map('map').setView([48.3, 1.9], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
}).addTo(map);

// ---------------- DATA ----------------
let stops = [];
let markers = [];
let routeLine = null;

// ---------------- ADD STOP ----------------
function addStop(){

    let q = document.getElementById("search").value;
    let t = document.getElementById("time").value;

    if(!q || !t) return alert("Adresse + heure obligatoires");

    fetch("https://nominatim.openstreetmap.org/search?format=json&q=" + encodeURIComponent(q))
    .then(r => r.json())
    .then(d => {

        if(!d.length) return alert("Introuvable");

        stops.push({
            name: d[0].display_name,
            lat: parseFloat(d[0].lat),
            lon: parseFloat(d[0].lon),
            time: t
        });

        drawList();
    });
}

// ---------------- REMOVE STOP ----------------
function removeStop(i){

    stops.splice(i,1);

    drawList();

    if(stops.length >= 2){
        optimizeTour();
    } else {
        clearMap();
        document.getElementById("stats").innerHTML = "Aucune tournée";
    }
}

// ---------------- OPTIMISATION ----------------
function optimizeTour(){

    if(stops.length < 2){
        alert("Ajoute au moins 2 points");
        return;
    }

    let coords = stops.map(s => s.lon + "," + s.lat).join(";");

    fetch("https://router.project-osrm.org/trip/v1/driving/" +
        coords +
        "?source=first&roundtrip=false&overview=full&geometries=geojson"
    )
    .then(r => r.json())
    .then(data => {

        if(!data.trips || !data.trips[0]){
            alert("Erreur OSRM");
            return;
        }

        let trip = data.trips[0];

        drawRoute(trip.geometry);

        buildSchedule(trip);

        drawMarkers();
    })
    .catch(err => {
        console.log(err);
        alert("Erreur réseau OSRM");
    });
}

// ---------------- PLANNING CLEAN ----------------
function buildSchedule(trip){

    if(!trip.legs || trip.legs.length === 0){
        document.getElementById("list").innerHTML =
            "<li>Erreur planning</li>";
        return;
    }

    // 🧠 ordre OSRM sécurisé
    let order = trip.waypoints?.map(w => w.waypoint_index) || stops.map((_,i)=>i);

    let orderedStops = order.map(i => stops[i]);

    // 🧠 départ = 1er stop
    let [h,m] = orderedStops[0].time.split(":");
    let current = parseInt(h)*60 + parseInt(m);

    let html = "";

    trip.legs.forEach((leg,i)=>{

        let stop = orderedStops[i] || stops[i];

        let travelMin = Math.round(leg.duration / 60);
        let unloadMin = 30;

        let hh = Math.floor(current / 60);
        let mm = String(current % 60).padStart(2,"0");

        let arrival = `${hh}:${mm}`;

        let status = (arrival > stop.time) ? "bad" : "ok";

        html += `
        <li class="${status}">
            <div>
                ${i+1} - ${stop.name}<br>
                RDV : ${stop.time} | Arrivée : ${arrival}<br>
                🚚 ${travelMin} min + ⬇ 30 min
            </div>
            <button class="small" onclick="removeStop(${stops.indexOf(stop)})">❌</button>
        </li>
        `;

        current += travelMin + unloadMin;
    });

    document.getElementById("list").innerHTML = html;

    document.getElementById("stats").innerHTML =
        "Tournée OK | Stops : " + stops.length;
}

// ---------------- ROUTE ----------------
function drawRoute(geo){

    if(routeLine) map.removeLayer(routeLine);

    routeLine = L.geoJSON(geo,{
        style:{color:"blue",weight:4}
    }).addTo(map);

    map.fitBounds(routeLine.getBounds());
}

// ---------------- MARKERS ----------------
function drawMarkers(){

    markers.forEach(m => map.removeLayer(m));
    markers = [];

    stops.forEach((s,i)=>{

        markers.push(
            L.marker([s.lat,s.lon])
            .addTo(map)
            .bindPopup((i+1)+" - "+s.name+"<br>RDV "+s.time)
        );
    });
}

// ---------------- EXPORT MAPS ----------------
function exportMaps(){

    if(stops.length === 0) return;

    let base = "https://www.google.com/maps/dir/?api=1";

    let origin = stops[0].lat + "," + stops[0].lon;
    let dest = stops[stops.length-1].lat + "," + stops[stops.length-1].lon;

    let waypoints = "";

    if(stops.length > 2){
        waypoints = stops.slice(1,-1)
        .map(s => s.lat + "," + s.lon)
        .join("|");
    }

    let url = base + "&origin=" + origin + "&destination=" + dest;

    if(waypoints) url += "&waypoints=" + waypoints;

    window.open(url,"_blank");
}

// ---------------- RESET ----------------
function resetAll(){

    stops = [];

    markers.forEach(m => map.removeLayer(m));
    markers = [];

    if(routeLine) map.removeLayer(routeLine);

    document.getElementById("list").innerHTML = "";
    document.getElementById("stats").innerHTML = "Aucune tournée";
}

</script>

</body>
</html>
